name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode without publishing"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Verify repository gate
        run: npm run check

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          log_file="$(mktemp)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx semantic-release --dry-run --no-ci 2>&1 | tee "$log_file"
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            npx semantic-release 2>&1 | tee "$log_file"
            if grep -Eq "Published release |Created tag v[0-9]" "$log_file"; then
              echo "released=true" >> "$GITHUB_OUTPUT"
            else
              echo "released=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Sync workspace to released commit
        if: steps.release.outputs.released == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - name: Install Comfy CLI
        if: steps.release.outputs.released == 'true'
        run: pip install comfy-cli

      - name: Publish Custom Node to Comfy Registry
        if: steps.release.outputs.released == 'true'
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          comfy --skip-prompt --no-enable-telemetry env
          comfy node publish --token "$REGISTRY_ACCESS_TOKEN"
